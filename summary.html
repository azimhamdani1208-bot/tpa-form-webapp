<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TPA Summary</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <nav id="topNav"></nav>
    <main class="container">
      <section class="card">
        <h1>Observation History</h1>
        <p id="summaryStatus" class="status"></p>
        <table>
          <thead>
            <tr><th>Date</th><th>Teacher</th><th>School</th><th>Observer</th><th>Average</th><th>Remarks</th></tr>
          </thead>
          <tbody id="historyRows"></tbody>
        </table>
      </section>
      <section class="card">
        <h2>Summary by Teacher</h2>
        <tbody id="teacherSummary"></tbody>
        <table><thead><tr><th>Teacher</th><th>Average Score</th><th>Observations</th></tr></thead><tbody id="teacherSummaryRows"></tbody></table>
      </section>
      <section class="card">
        <h2>Summary by School</h2>
        <table><thead><tr><th>School</th><th>Average Score</th><th>Observations</th></tr></thead><tbody id="schoolSummaryRows"></tbody></table>
      </section>
    </main>
    <script type="module" src="./summary.js"></script>
  </body>
</html>
